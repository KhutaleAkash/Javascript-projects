        <div class="container">
            <input type="text" id="inputAssign1" placeholder="Enter A Task" style="height: 30px ;">
            <button class="btn btn-primary"  onclick="addToDos()">Add Task</button>
            <button class="btn btn-primary" onclick="ClearAllToDo()">Clear All</button>
        </div>
        <div class="container" id="resultToDo"></div>
    </div>
    <script>
        toDos=[]
        function renderToDo(){
             document.querySelector('#resultToDo').innerHTML=toDos.map((task ,i)=>`
                                     <div class='mb-1'>
                                        <b class='text-primary pe-5'>${task}</b>
                                        <button class='btn btn-danger' onclick="deletetask(${i})"">Delete</button>
        `).join('')
        }
        function addToDos(){
        inputToDoElmt=document.querySelector('#inputAssign1')
        newToDo=inputToDoElmt.value
        toDos.push(newToDo)
        console.log(toDos)
        renderToDo()
        inputToDoElmt.value=''
        }

        function ClearAllToDo(){
            toDos=[]
            renderToDo()
        }
        function deletetask(i){
            toDos.splice(i,1)
            console.log(i)
            renderToDo()
        }
    </script>
