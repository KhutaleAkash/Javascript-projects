<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5" style="max-width:400px;">

  <h3>Login</h3>

 
  <div class="mb-3">
    <label>Email</label>
    <input type="email" id="loginEmail" class="form-control" placeholder="Enter email">
  </div>

  
  <div class="mb-3">
    <label>Password</label>
    <input type="password" id="loginPassword" class="form-control" placeholder="Enter password">
  </div>

  
  <button type="button" class="btn btn-primary w-100" onclick="login()">Login</button>

</div>

<script>
function login() {

    let email = document.getElementById("loginEmail").value.trim();
    let password = document.getElementById("loginPassword").value;

    
    let storedUser = JSON.parse(localStorage.getItem("user"));


   
    if (!storedUser) {
        alert("User not registered ");
        return;
    }

    
    if (email === storedUser.email && password === storedUser.password) {
        alert("Login Successful ");

        
        window.location.href = "Home.html";
    } else {
        alert("Invalid Email or Password ");
    }
}
</script>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
